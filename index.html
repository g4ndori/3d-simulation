<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bike Simulation [TEST]</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a2238;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-panel {
            background: rgba(10, 15, 25, 0.9);
            padding: 12px 20px;
            border-radius: 6px;
            border-left: 4px solid #00ffcc;
            color: #fff;
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #dashboard {
            align-self: flex-start;
            display: flex;
            gap: 30px;
        }

        .stat { display: flex; flex-direction: column; }
        .label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 24px; font-weight: 800; font-family: monospace; }
        #speed-value { color: #ff3b30; }

        #minimap-container {
            align-self: flex-start;
            width: 150px;
            height: 150px;
            border: 3px solid #444;
            border-radius: 8px;
            background: #111;
            overflow: hidden;
            position: relative;
            pointer-events: auto;
        }

        #minimap-canvas {
            width: 150px;
            height: 150px;
        }

        #player-marker {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 12px solid #00ffcc;
            transform: translate(-50%, -50%);
            z-index: 15;
        }

        #controls-guide {
            align-self: center;
            font-size: 12px;
            color: #ccc;
            background: rgba(0,0,0,0.8);
            padding: 6px 15px;
            border-radius: 20px;
        }
        kbd { background: #333; padding: 2px 5px; border-radius: 3px; color: #fff; border: 1px solid #555;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="dashboard" class="hud-panel">
            <div class="stat">
                <span class="label">Speed</span>
                <span class="value"><span id="speed-value">0</span> <span style="font-size:12px;color:#666">KM/H</span></span>
            </div>
            <div class="stat">
                <span class="label">POV Mode</span>
                <span class="value" id="view-value" style="font-size: 15px; margin-top: 5px; color: #00ffcc;">1st Person</span>
            </div>
        </div>

        <div id="controls-guide">
            <kbd>W</kbd> Gas (Slow Build) | <kbd>S</kbd> Brake | <kbd>A/D</kbd> Lean | <kbd>C</kbd> Camera View
        </div>

        <div id="minimap-container">
            <div id="player-marker"></div>
            <canvas id="minimap-canvas" width="150" height="150"></canvas>
        </div>
    </div>

    <script>
        let scene, camera, renderer, bikeGroup;
        let mapCtx, mapCanvas;
        
        const CITY_SIZE = 900; 
        const BLOCK_SIZE = 70;
        const STREET_WIDTH = 22;
        let buildingsData = [];

        const physics = {
            speedKMH: 0,
            velocity: 0,
            maxSpeed: 2.2,
            angle: 0,
            leanAngle: 0,
            posX: 0,
            posZ: 0,
            isFirstPerson: true
        };

        const keys = { w: false, a: false, s: false, d: false };

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a2238); 
            scene.fog = new THREE.FogExp2(0x1a2238, 0.006);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const moonLight = new THREE.DirectionalLight(0xaaccff, 0.8);
            moonLight.position.set(200, 400, 100);
            scene.add(moonLight);

            const terrainGeo = new THREE.PlaneGeometry(CITY_SIZE, CITY_SIZE);
            const terrainMat = new THREE.MeshStandardMaterial({ color: 0x11141c, roughness: 1.0 });
            const ground = new THREE.Mesh(terrainGeo, terrainMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            generateArchitecturalCity();

            bikeGroup = new THREE.Group();
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.55, 1.3), new THREE.MeshStandardMaterial({ color: 0xff3b30, roughness: 0.2 }));
            frame.position.y = 0.4;
            bikeGroup.add(frame);
            scene.add(bikeGroup);

            mapCanvas = document.getElementById('minimap-canvas');
            mapCtx = mapCanvas.getContext('2d');

            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            window.addEventListener('resize', onWindowResize);
        }

        function createWindowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#252e42'; 
            ctx.fillRect(0, 0, 64, 64);
            
            ctx.fillStyle = Math.random() > 0.4 ? '#ffea75' : '#4da6ff'; 
            for (let y = 8; y < 64; y += 16) {
                for (let x = 8; x < 64; x += 16) {
                    if (Math.random() > 0.25) {
                        ctx.fillRect(x, y, 6, 8);
                    }
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        function generateArchitecturalCity() {
            const halfSize = CITY_SIZE / 2;
            const step = BLOCK_SIZE + STREET_WIDTH;

            const roadMat = new THREE.MeshStandardMaterial({ color: 0x18181b, roughness: 0.8 });
            const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x4b5263, roughness: 0.9 });
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 }); 

            for (let x = -halfSize; x < halfSize; x += step) {
                for (let z = -halfSize; z < halfSize; z += step) {
                    
                    const roadX = new THREE.Mesh(new THREE.PlaneGeometry(CITY_SIZE, STREET_WIDTH), roadMat);
                    roadX.rotation.x = -Math.PI / 2;
                    roadX.position.set(0, 0.02, z + BLOCK_SIZE + STREET_WIDTH / 2);
                    scene.add(roadX);

                    const roadZ = new THREE.Mesh(new THREE.PlaneGeometry(STREET_WIDTH, CITY_SIZE), roadMat);
                    roadZ.rotation.x = -Math.PI / 2;
                    roadZ.position.set(x + BLOCK_SIZE + STREET_WIDTH / 2, 0.01, 0);
                    scene.add(roadZ);

                    for (let i = -halfSize; i < halfSize; i += 25) {
                        const dividerX = new THREE.Mesh(new THREE.PlaneGeometry(10, 0.2), lineMat);
                        dividerX.rotation.x = -Math.PI / 2;
                        dividerX.position.set(i, 0.03, z + BLOCK_SIZE + STREET_WIDTH / 2);
                        scene.add(dividerX);

                        const dividerZ = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 10), lineMat);
                        dividerZ.rotation.x = -Math.PI / 2;
                        dividerZ.position.set(x + BLOCK_SIZE + STREET_WIDTH / 2, 0.025, i);
                        scene.add(dividerZ);
                    }

                    const swSize = BLOCK_SIZE + 3; 
                    const sidewalk = new THREE.Mesh(new THREE.BoxGeometry(swSize, 0.2, swSize), sidewalkMat);
                    sidewalk.position.set(x + BLOCK_SIZE / 2, 0.1, z + BLOCK_SIZE / 2);
                    scene.add(sidewalk);

                    if (Math.abs(x) < 40 && Math.abs(z) < 40) continue; 

                    let bHeight = 30 + Math.random() * 70;
                    
                    const texture = createWindowTexture();
                    texture.repeat.set(3, Math.round(bHeight / 10)); 
                    const buildingMat = new THREE.MeshStandardMaterial({ 
                        color: 0xffffff,
                        map: texture,
                        roughness: 0.4 
                    });

                    let building = new THREE.Mesh(new THREE.BoxGeometry(BLOCK_SIZE, bHeight, BLOCK_SIZE), buildingMat);
                    building.position.set(x + BLOCK_SIZE / 2, bHeight / 2 + 0.2, z + BLOCK_SIZE / 2);
                    scene.add(building);

                    const trimMesh = new THREE.Mesh(
                        new THREE.BoxGeometry(BLOCK_SIZE + 0.5, 1.5, BLOCK_SIZE + 0.5),
                        new THREE.MeshStandardMaterial({ color: 0x111520, roughness: 0.5 })
                    );
                    trimMesh.position.set(x + BLOCK_SIZE / 2, bHeight + 0.2, z + BLOCK_SIZE / 2);
                    scene.add(trimMesh);

                    buildingsData.push({ x: x + BLOCK_SIZE / 2, z: z + BLOCK_SIZE / 2, size: BLOCK_SIZE });
                }
            }
        }

        function handleKeyDown(e) {
            switch (e.key.toLowerCase()) {
                case 'w': keys.w = true; break;
                case 'a': keys.a = true; break;
                case 's': keys.s = true; break;
                case 'd': keys.d = true; break;
                case 'c': 
                    physics.isFirstPerson = !physics.isFirstPerson; 
                    document.getElementById('view-value').innerText = physics.isFirstPerson ? "1st View" : "3st View";
                    break;
            }
        }

        function handleKeyUp(e) {
            switch (e.key.toLowerCase()) {
                case 'w': keys.w = false; break;
                case 'a': keys.a = false; break;
                case 's': keys.s = false; break;
                case 'd': keys.d = false; break;
            }
        }

        function updatePhysics() {
            // --- CRITICAL: ULTRA-SLOW HEAVY CUBIC ACCELERATION LOGIC ---
            if (keys.w) {
                let speedProgress = physics.velocity / physics.maxSpeed;
                
                // Cubic formulation keeps momentum sluggish at low speeds and builds cleanly over time
                let gradualScale = 0.0018 + (Math.pow(speedProgress, 3) * 0.015) * (1.0 - speedProgress * 0.9);
                
                physics.velocity = Math.min(physics.velocity + gradualScale, physics.maxSpeed);
            } else if (keys.s) {
                physics.velocity = Math.max(physics.velocity - 0.04, -0.4); 
            } else {
                physics.velocity *= 0.99; 
                if (physics.velocity < 0.001) physics.velocity = 0;
            }

            physics.speedKMH = physics.velocity * 135;

            // --- PROGRESSIVE STEERING ---
            let steeringStabilityRatio = Math.max(0.15, 1.0 - (physics.speedKMH / 260));
            let steerScale = Math.min(physics.velocity / 0.3, 1.0) * steeringStabilityRatio;
            
            if (keys.a) {
                physics.angle += 0.032 * steerScale;
                physics.leanAngle = THREE.MathUtils.lerp(physics.leanAngle, 0.45, 0.08);
            } else if (keys.d) {
                physics.angle -= 0.032 * steerScale;
                physics.leanAngle = THREE.MathUtils.lerp(physics.leanAngle, -0.45, 0.08);
            } else {
                physics.leanAngle = THREE.MathUtils.lerp(physics.leanAngle, 0, 0.12);
            }

            physics.posX += Math.sin(physics.angle) * physics.velocity;
            physics.posZ += Math.cos(physics.angle) * physics.velocity;

            checkCollisions();

            bikeGroup.position.set(physics.posX, 0, physics.posZ);
            bikeGroup.rotation.set(0, physics.angle, physics.leanAngle);

            document.getElementById('speed-value').innerText = Math.round(Math.abs(physics.speedKMH));
        }

        function checkCollisions() {
            const boundBuffer = 2.2; 
            buildingsData.forEach(b => {
                let halfB = b.size / 2;
                if (physics.posX > b.x - halfB - boundBuffer && physics.posX < b.x + halfB + boundBuffer &&
                    physics.posZ > b.z - halfB - boundBuffer && physics.posZ < b.z + halfB + boundBuffer) {
                    
                    physics.velocity = -physics.velocity * 0.3; 
                    physics.posX -= Math.sin(physics.angle) * 2.2;
                    physics.posZ -= Math.cos(physics.angle) * 2.2;
                }
            });

            const cityLimit = CITY_SIZE / 2 - 15;
            physics.posX = Math.max(-cityLimit, Math.min(cityLimit, physics.posX));
            physics.posZ = Math.max(-cityLimit, Math.min(cityLimit, physics.posZ));
        }

        function updateCamera() {
            if (physics.isFirstPerson) {
                camera.position.set(physics.posX, 0.95, physics.posZ + Math.cos(physics.angle) * 0.1);
                camera.rotation.order = "YXZ";
                camera.rotation.y = physics.angle + Math.PI;
                camera.rotation.x = -0.04;
                camera.rotation.z = physics.leanAngle * 0.85;
            } else {
                const followDist = 5.2;
                const followHeight = 1.9;
                camera.position.x = physics.posX - Math.sin(physics.angle) * followDist;
                camera.position.z = physics.posZ - Math.cos(physics.angle) * followDist;
                camera.position.y = followHeight;
                camera.lookAt(physics.posX, 0.5, physics.posZ);
            }
        }

        function drawGTAHUDMap() {
            mapCtx.clearRect(0, 0, 150, 150);
            
            mapCtx.save();
            mapCtx.translate(75, 75);
            mapCtx.rotate(-physics.angle - Math.PI);

            mapCtx.fillStyle = "#1c2333";
            mapCtx.fillRect(-500, -500, 1000, 1000);

            mapCtx.fillStyle = "#0c0f17";
            const step = BLOCK_SIZE + STREET_WIDTH;
            const halfSize = CITY_SIZE / 2;

            for (let x = -halfSize; x < halfSize; x += step) {
                for (let z = -halfSize; z < halfSize; z += step) {
                    let rx = (x + BLOCK_SIZE + STREET_WIDTH/2 - physics.posX) * 0.75;
                    let rz = (z + BLOCK_SIZE + STREET_WIDTH/2 - physics.posZ) * 0.75;
                    
                    mapCtx.fillRect(-75, rz - (STREET_WIDTH*0.75)/2, 150, STREET_WIDTH * 0.75);
                    mapCtx.fillRect(rx - (STREET_WIDTH*0.75)/2, -75, STREET_WIDTH * 0.75, 150);
                }
            }

            mapCtx.restore();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            updateCamera();
            drawGTAHUDMap();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
